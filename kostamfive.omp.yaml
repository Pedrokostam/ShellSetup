# yaml-language-server: $schema=https://raw.githubusercontent.com/JanDeDobbeleer/oh-my-posh/main/themes/schema.json

var:
  head_last_char: 6
  head_length: 20
blocks:
- type: prompt
  alignment: left
  segments:
  - properties:
      alpine: 
      arch: 
      centos: 
      debian: 
      elementary: 
      fedora: 
      gentoo: 
      linux: 
      macos: 
      manjaro: 
      mint: 
      opensuse: 
      raspbian: 
      ubuntu: 
      windows: 
    style: diamond
    template: " {{ .Icon }} {{ .HostName }} "
    foreground: "#f2f3f8"
    background: "#5F3467"
    type: os
  - properties:
      folder_icon: 
      folder_separator_icon: " <transparent>\ue0b1</> "
      home_icon: 
      mapped_locations:
        C:/Users/Pedro/Documents/GitHub: 
        C:/Users/Pedro/OneDrive: 
        C:/Users/Pedro/OneDrive/FLACBAZA: 
        C:/WORK/Github/Endeas: "<#EEFF30>\ue0c2\ue0c0Endeas\ue0c2\ue0c0</>"
        C:/WORK/SVN: "<#06cbc1>\uf085SVN\uf085</>"
      max_depth: 2
      mixed_threshold: 8
      style: agnoster_short
    style: powerline
    template: " {{ .Path }} "
    foreground: "#f2f3f8"
    powerline_symbol: 
    background: "#00477f"
    type: path
  - properties:
      branch_gone_icon: 
      branch_icon: "\uf418 "
      branch_identical_icon: 
      branch_max_length: 100
      fetch_stash_count: true
      fetch_status: false
    style: powerline
    leading_diamond: <transparent,background></>
    trailing_diamond: 
    template: "{{ $head:= trim .HEAD }}{{ $front:=sub (sub .Var.head_length .Var.head_last_char) 1 }}{{ $len:= len $head }}{{ if gt $len (.Var.head_length) }} {{ trunc $front $head }}…{{ trunc (mul -1 .Var.head_last_char) $head }}{{ else }}{{ .HEAD }}{{ end }}{{if .BranchStatus }} {{ .BranchStatus }}{{ end }}{{ if .Working.Changed }} <transparent>\ue0b1</>\uf044{{ .Working.String }}</>{{ end }}{{ if .Staging.Changed }} <transparent>\ue0b1</>\uf046 {{ .Staging.String }}</>{{ end }}{{ if gt .StashCount 0 }} <transparent>\ue0b1</> <#121318>\ueb4b {{ .StashCount }}</>{{ end }} "
    foreground: "#f2f3f8"
    powerline_symbol: 
    background: "#275504"
    type: git
    background_templates:
    - "{{ if or (.Working.Changed) (.Staging.Changed) }}#a83434{{ end }}"
    - "{{ if and (gt .Ahead 0) (gt .Behind 0) }}#54433a{{ end }}"
    - "{{ if gt .Ahead 0 }}#744d89{{ end }}"
    - "{{ if gt .Behind 0 }}#744d89{{ end }}"
  - style: powerline
    template: " \ue235 {{ .Major }}.{{ .Minor }} "
    foreground: "#100e23"
    powerline_symbol: 
    background: "#906cff"
    type: python
- type: prompt
  alignment: right
  segments:
  - properties:
      always_enabled: true
      style: austin
    style: powerline
    template: " {{ .FormattedMs }} "
    foreground: "#dddddd"
    powerline_symbol: 
    background: "#585858"
    type: executiontime
    invert_powerline: true
  - properties:
      time_format: "15:04:05"
    style: diamond
    trailing_diamond: 
    template: " {{ .CurrentDate | date .Format }} "
    foreground: "#f2f3f8"
    background: "#a73f00"
    type: time
    invert_powerline: true
- type: prompt
  alignment: left
  segments:
  - style: powerline
    template: "{{ if .Root }}\uf0e7{{else}}{{end}}<b>{{ .UserName }} \uf101</b>"
    foreground: "#ff0000"
    background: <transparent>
    type: session
  newline: true
version: 3
final_space: true
async: true
